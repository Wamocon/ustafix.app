<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5A623" />
      <stop offset="100%" stop-color="#E8870E" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- Helmet dome: elliptical arc for proper hard hat shape -->
  <path d="M 92 232 A 164 145 0 0 1 420 232"
        fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />

  <!-- Ridge / vent capsule on dome top -->
  <rect x="234" y="54" width="44" height="78" rx="22"
        fill="url(#bg)" stroke="#FFFFFF" stroke-width="14" />

  <!-- Helmet brim -->
  <rect x="76" y="226" width="360" height="22" rx="11"
        fill="none" stroke="#FFFFFF" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round" />

  <!-- Goggles -->
  <path d="
    M 130 278
    Q 256 266 382 278
    Q 424 278 424 318
    L 424 344
    Q 424 382 386 382
    L 314 382
    C 282 382 282 422 256 422
    C 230 422 230 382 198 382
    L 126 382
    Q 88 382 88 344
    L 88 318
    Q 88 278 130 278
    Z
  " fill="none" stroke="#FFFFFF" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round" />

  <!-- Goggle side arms -->
  <line x1="74" y1="310" x2="74" y2="348"
        stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />
  <line x1="438" y1="310" x2="438" y2="348"
        stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" />
</svg>
